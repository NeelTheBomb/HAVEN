config_type: "evaluation" # options: data_preprocessor, prediction, evaluation

# Input Settings:
  ## initialize base input folder name
  ## provide path to dataset folder
input_settings:
  # Base input directory
  input_dir: "output/raw"

  file_names:
    # compare different output files 

    # 1. LR Baseline Model
    "LR" : "uniref50/lr_model/kmer_k3_virus_host_name_multi_lr_model_98percent_seq_length_5itr_lr_output.csv"

    # 2. RF Baseline Model
    "RF" : "uniref50/rf_model/kmer_k3_virus_host_name_multi_rf_model_98percent_seq_length_5itr_rf_output.csv"

    # 3. SVM Baseline Model
    "SVM" : "uniref50/svm_model/kmer_k3_virus_host_name_multi_svm_model_98percent_seq_length_5itr_svm_output.csv"

evaluation_settings:
  type: "multi"
  # metrics
  auroc: False
  auprc: True
  f1: False
  accuracy: False
  prediction_distribution: False

label_mappings:
  "homo sapiens" : "Human"
  "sus scrofa" : "Pig"
  "hydrochoerus hydrochaeris" : "Capybara"
  "propithecus coquereli" : "Coquerel's sifaka (Lemur)"
  "marmota himalayan" : "Himalayan marmot"
  "cyprinus carpio" : "Common Carp"
  "varecia variegata" : "Black-and-white ruffed Lemur"


output_settings:
  output_dir: "output"
  evaluation_dir: "evaluation"
  visualization_dir: "visualization"
  dataset_dir: "uniref50/baselinemodels"
  prefix: "uniref50_baselinemodels"# default: none; default file name = <input_file_name>_<output_prefix>_output.csv