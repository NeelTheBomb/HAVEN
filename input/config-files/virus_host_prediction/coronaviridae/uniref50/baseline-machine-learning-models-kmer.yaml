config_type: "virus_host_prediction_baseline_machine_learning"

# Input Settings:
  ## initialize base input folder name
  ## provide path to dataset folder
input_settings:
  # Base input directory
  input_dir: "input/data/coronaviridae/20250616"

  # Name of file(s) in subdirectory to be read and processed.
  # Example: file_names: ["file_1.csv", "file_2.csv", "file_3.csv"]
  file_names: [ "final_filtered_df.csv" ]
  # seeds to split the files into training and testing
  # if provided, the number of seeds must match the number of iterations configured in classification_settings (n_iterations)
  split_seeds: [ 12612648, 31062180, 48918293, 55631155, 79221635 ]


classification_settings:
  experiment: "virus_host_prediction_baseline_machine_learning"
  n_iterations: 5
  split_input: True
  train_proportion: 0.8
  type: "multi"
  sequence_settings:
    id_col: "uniref50_id"
    sequence_col: "seq"
    feature_type: "kmer"  # supported values 'kmer' (additional parameter 'k' required) , 'pssm', 'token'
    kmer_settings:
      k: 3
      kmer_prevalence_threshold: 0.1
  label_settings:
    label_col: "virus_host_tax_id"
    exclude_labels: [ "nan"]
    label_groupings:
      "Human": [ 9606 ]
      "Chicken": [ 9031 ]
      "Cat": [ 9685 ]
      "Pig": [ 9823 ]
      "Gray wolf": [ 9612 ]
      "European rabbit": [ 9986 ]
  models:
    - name: "lr"
      active: False
      C: [0.01, 0.1, 1]
      multiclass_type: "multinomial"
      max_iter: 500

    - name: "rf"
      active: False
      n_estimators: [10, 100, 1000]
      max_depth: [3, 5]

    - name: "svm"
      active: True
      C: [ 0.01, 0.1, 1, 10]
      kernel: "rbf"

output_settings:
  output_dir: "output"
  results_dir: "raw"
  visualizations_dir: "visualization"
  sub_dir: "uniref50_coronaviridae/uniref50_corona_top_hosts"
  prefix:  "svm" # default: none; default file name = kmer_k<k>_lr_c<c>_<label>_<type>_tr<train_proportion>_n<n_iterations>_<output_prefix>_output.csv
